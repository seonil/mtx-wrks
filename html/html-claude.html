<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전장부품 프로젝트 대시보드</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --primary: #2563eb;
    --primary-light: #eff4ff;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --warning: #f59e0b;
    --warning-light: #fffbeb;
    --success: #10b981;
    --success-light: #ecfdf5;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.07);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .wrapper { max-width: 1280px; margin: 0 auto; padding: 0 24px 48px; }

  /* ── Top Bar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }
  .topbar-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--text); }
  .logo-icon {
    width: 34px; height: 34px; background: var(--primary); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px;
  }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .badge-btn {
    position: relative; background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--text-secondary); padding: 6px;
    border-radius: 8px; transition: background .2s;
  }
  .badge-btn:hover { background: var(--bg); }
  .badge-dot {
    position: absolute; top: 4px; right: 4px; width: 8px; height: 8px;
    background: var(--danger); border-radius: 50%; border: 2px solid var(--surface);
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #2563eb);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }

  /* ── Page Header ── */
  .page-header {
    padding: 32px 0 8px;
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .page-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
  .page-header p { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }
  .sync-info { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; }

  /* ── KPI Cards ── */
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 24px 0; }
  .card {
    background: var(--surface); border-radius: var(--radius); padding: 24px;
    border: 1px solid var(--border); box-shadow: var(--shadow);
    transition: box-shadow .25s, transform .25s; cursor: default;
  }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .card-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .card-icon.blue   { background: var(--primary-light); color: var(--primary); }
  .card-icon.red    { background: var(--danger-light);  color: var(--danger); }
  .card-icon.amber  { background: var(--warning-light); color: var(--warning); }
  .card-icon.green  { background: var(--success-light); color: var(--success); }
  .card-value { font-size: 36px; font-weight: 800; letter-spacing: -.03em; line-height: 1; }
  .card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
  .card-sub .up   { color: var(--success); font-weight: 600; }
  .card-sub .down { color: var(--danger);  font-weight: 600; }

  /* ── Section ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 36px 0 16px; flex-wrap: wrap; gap: 8px;
  }
  .section-header h2 { font-size: 17px; font-weight: 700; }
  .filter-group { display: flex; gap: 6px; }
  .filter-btn {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); font-size: 13px; color: var(--text-secondary);
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); box-shadow: var(--shadow); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 720px; }
  thead th {
    text-align: left; padding: 14px 18px; font-size: 12px; font-weight: 600;
    color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em;
    border-bottom: 1px solid var(--border); background: #fafbfc;
  }
  tbody td { padding: 14px 18px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: #f8fafc; }
  .status {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .status.pending   { background: var(--warning-light); color: #b45309; }
  .status.done      { background: var(--success-light); color: #047857; }
  .status.overdue   { background: var(--danger-light);  color: #b91c1c; }
  .status.inprogress{ background: var(--primary-light); color: var(--primary); }
  .priority-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  }
  .priority-dot.high   { background: var(--danger); }
  .priority-dot.medium { background: var(--warning); }
  .priority-dot.low    { background: var(--success); }

  /* ── Footer ── */
  .footer { text-align: center; padding: 32px 0 16px; font-size: 12px; color: var(--text-secondary); }

  /* ── Responsive ── */
  @media (max-width: 1024px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .cards { grid-template-columns: 1fr; gap: 14px; }
    .page-header h1 { font-size: 20px; }
    .card { padding: 20px; }
    .card-value { font-size: 30px; }
    .topbar-inner { height: 52px; }
    .logo span { display: none; }
    .section-header { flex-direction: column; align-items: flex-start; }
    thead th, tbody td { padding: 12px 14px; }
  }

  /* ── Animations ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .animate { animation: fadeUp .45s ease both; }
  .delay-1 { animation-delay: .08s; }
  .delay-2 { animation-delay: .16s; }
  .delay-3 { animation-delay: .24s; }
  .delay-4 { animation-delay: .32s; }
</style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span>ELEC-PARTS Project Hub</span>
    </div>
    <div class="topbar-right">
      <button class="badge-btn" title="알림">🔔<span class="badge-dot"></span></button>
      <div class="avatar">PM</div>
    </div>
  </div>
</header>

<div class="wrapper">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1>프로젝트 현황 대시보드</h1>
      <p>전장부품사업부 · 2026년 3월 첫째 주</p>
    </div>
    <div class="sync-info"><span class="sync-dot"></span> <span id="syncTime"></span> 기준</div>
  </div>

  <!-- KPI Cards -->
  <div class="cards">
    <div class="card animate delay-1" id="cardProjects">
      <div class="card-top">
        <span class="card-label">진행 중 프로젝트</span>
        <div class="card-icon blue">📂</div>
      </div>
      <div class="card-value" id="valProjects">12</div>
      <div class="card-sub"><span class="up">▲ 2</span>&nbsp;지난 주 대비</div>
    </div>
    <div class="card animate delay-2" id="cardIssues">
      <div class="card-top">
        <span class="card-label">주요 이슈</span>
        <div class="card-icon red">⚠</div>
      </div>
      <div class="card-value" id="valIssues">5</div>
      <div class="card-sub"><span class="down">▲ 1</span>&nbsp;지난 주 대비</div>
    </div>
    <div class="card animate delay-3" id="cardSchedule">
      <div class="card-top">
        <span class="card-label">이번 주 일정</span>
        <div class="card-icon amber">📅</div>
      </div>
      <div class="card-value" id="valSchedule">8</div>
      <div class="card-sub">마일스톤 <b>3</b>건 포함</div>
    </div>
    <div class="card animate delay-4" id="cardRisk">
      <div class="card-top">
        <span class="card-label">위험 항목</span>
        <div class="card-icon green">🛡</div>
      </div>
      <div class="card-value" id="valRisk">3</div>
      <div class="card-sub"><span class="up">▼ 1</span>&nbsp;지난 주 대비</div>
    </div>
  </div>

  <!-- Action Items Section -->
  <div class="section-header">
    <h2>최근 액션 아이템</h2>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="overdue">지연</button>
      <button class="filter-btn" data-filter="inprogress">진행 중</button>
      <button class="filter-btn" data-filter="done">완료</button>
    </div>
  </div>

  <div class="table-wrap animate delay-4">
    <table>
      <thead>
        <tr>
          <th>No.</th>
          <th>액션 아이템</th>
          <th>프로젝트</th>
          <th>담당자</th>
          <th>마감일</th>
          <th>우선순위</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="actionBody"></tbody>
    </table>
  </div>

  <div class="footer">© 2026 ELEC-PARTS 전장부품사업부 · 내부 전용</div>
</div>

<script>
(function(){
  // ── Sync time ──
  var now = new Date();
  document.getElementById('syncTime').textContent =
    now.getFullYear()+'.'+(''+(now.getMonth()+1)).padStart(2,'0')+'.'+(''+ now.getDate()).padStart(2,'0')+' '+
    (''+ now.getHours()).padStart(2,'0')+':'+(''+ now.getMinutes()).padStart(2,'0');

  // ── Action Items Data ──
  var items = [
    { no:1, action:'ADAS 카메라 모듈 EMC 시험 결과 검토',       project:'ADAS-Front Cam v3',   owner:'김도현', due:'2026-03-06', priority:'high',   status:'overdue' },
    { no:2, action:'BMS 2차 프로토타입 회로도 승인 요청',         project:'EV BMS Gen2',         owner:'이수진', due:'2026-03-07', priority:'high',   status:'inprogress' },
    { no:3, action:'전동 파워트레인 ECU 펌웨어 v2.4 배포',       project:'ePT Controller',      owner:'박재영', due:'2026-03-05', priority:'medium', status:'done' },
    { no:4, action:'OTA 서버 보안 취약점 패치 적용',              project:'OTA Platform',        owner:'최민서', due:'2026-03-08', priority:'high',   status:'inprogress' },
    { no:5, action:'LED 헤드램프 열해석 시뮬레이션 완료',         project:'Smart Lighting v2',   owner:'정하늘', due:'2026-03-04', priority:'medium', status:'done' },
    { no:6, action:'고객사(H사) APQP 문서 제출',                 project:'ADAS-Front Cam v3',   owner:'김도현', due:'2026-03-09', priority:'high',   status:'pending' },
    { no:7, action:'인버터 IGBT 모듈 공급사 2차 감사',           project:'ePT Controller',      owner:'윤서준', due:'2026-03-10', priority:'medium', status:'pending' },
    { no:8, action:'CAN-FD 통신 프로토콜 검증 테스트',           project:'EV BMS Gen2',         owner:'이수진', due:'2026-03-03', priority:'low',    status:'done' },
    { no:9, action:'레이더 센서 간섭 테스트 일정 조율',           project:'Radar Fusion R1',     owner:'한지우', due:'2026-03-11', priority:'medium', status:'inprogress' },
    { no:10,action:'ISO 26262 FMEA 업데이트 (BMS)',              project:'EV BMS Gen2',         owner:'박재영', due:'2026-03-06', priority:'high',   status:'overdue' }
  ];

  var statusLabel = { overdue:'지연', inprogress:'진행 중', done:'완료', pending:'대기' };
  var priorityLabel = { high:'높음', medium:'중간', low:'낮음' };

  function renderTable(filter){
    var filtered = filter === 'all' ? items : items.filter(function(i){ return i.status === filter; });
    var html = '';
    filtered.forEach(function(r){
      html += '<tr data-status="'+r.status+'">'
        +'<td style="color:var(--text-secondary);font-weight:600;">'+ r.no +'</td>'
        +'<td style="font-weight:500;">'+ r.action +'</td>'
        +'<td><span style="color:var(--primary);font-weight:500;">'+ r.project +'</span></td>'
        +'<td>'+ r.owner +'</td>'
        +'<td style="white-space:nowrap;">'+ r.due +'</td>'
        +'<td><span class="priority-dot '+r.priority+'"></span>'+ priorityLabel[r.priority] +'</td>'
        +'<td><span class="status '+r.status+'">'+ statusLabel[r.status] +'</span></td>'
        +'</tr>';
    });
    document.getElementById('actionBody').innerHTML = html;
  }

  renderTable('all');

  // ── Filter buttons ──
  var btns = document.querySelectorAll('.filter-btn');
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      btns.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      renderTable(btn.getAttribute('data-filter'));
    });
  });

  // ── Animated count-up ──
  function countUp(el, target){
    var start = 0, duration = 600, step = Math.ceil(duration / target);
    var timer = setInterval(function(){
      start++;
      el.textContent = start;
      if(start >= target) clearInterval(timer);
    }, step);
  }
  countUp(document.getElementById('valProjects'), 12);
  countUp(document.getElementById('valIssues'), 5);
  countUp(document.getElementById('valSchedule'), 8);
  countUp(document.getElementById('valRisk'), 3);
})();
</script>
</body>
</html>
